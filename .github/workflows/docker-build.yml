name: Build and Push Docker Images

on:
  push:
    # NOTE: '*' deliberately does NOT match slash-named branches (feat/..., docs/...) —
    # GitHub's single-star stops at '/'. That keeps feature branches from publishing
    # image tags. Pre-merge validation for release branches comes from pull_request below.
    branches: ['*']
    tags: ['v*']
  pull_request:
    branches: [main, 'factorio-*']

env:
  REGISTRY: ghcr.io
  CONTROLLER_IMAGE: ${{ github.repository }}-controller
  HOST_IMAGE: ${{ github.repository }}-host

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history: the changelog gate diffs the pushed range

      - name: Changelog gate — image changes must carry a change notice
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: |
          BEFORE="${{ github.event.before }}"
          if ! git cat-file -e "$BEFORE" 2>/dev/null; then
            echo "Base commit $BEFORE unavailable (force push?) — skipping changelog gate."
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}")
          printf 'Changed files in push:\n%s\n' "$CHANGED"
          if printf '%s\n' "$CHANGED" | grep -qE '^(Dockerfile\.(controller|host)|scripts/|docker-compose[^/]*\.ya?ml$|\.github/workflows/)'; then
            if ! printf '%s\n' "$CHANGED" | grep -qx 'CHANGELOG.md'; then
              echo "::error file=CHANGELOG.md::This push changes image-affecting files but adds no change notice. Add an entry to CHANGELOG.md (format in its header) and push again."
              exit 1
            fi
          fi
          echo "Changelog gate OK."

      # factorio-* branches carry 2.1-era fixes that exist in the fork but NOT yet
      # in the npm release (e.g. lenient mod version parsing, the recycler builtin
      # — empirically: npm alpha.26 rejects 2.1-format mod info.json). PRs into
      # those branches must therefore build the SAME custom target the merge will
      # publish, cloning the fork branch matching the PR's BASE.
      - name: Clone Clusterio fork (non-main branch pushes + factorio-* PRs)
        if: >-
          (github.event_name == 'push' && github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')) ||
          (github.event_name == 'pull_request' && startsWith(github.base_ref, 'factorio-'))
        env:
          REF_NAME: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}
        run: |
          echo "Cloning Clusterio fork branch: $REF_NAME"
          git clone --depth 1 -b "$REF_NAME" \
            https://github.com/solarcloud7/clusterio clusterio/ 2>/dev/null \
          || {
            echo "Branch '$REF_NAME' not found in fork, falling back to the fork's default branch"
            git clone --depth 1 \
              https://github.com/solarcloud7/clusterio clusterio/
          }
          echo "CLUSTERIO_TARGET=custom" >> "$GITHUB_ENV"

      - name: Set Clusterio target (release — main-targeted PRs, main, and tags)
        if: >-
          (github.event_name == 'pull_request' && !startsWith(github.base_ref, 'factorio-')) ||
          github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        run: echo "CLUSTERIO_TARGET=release" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Clusterio version for release image tag
        id: clusterio_version
        run: echo "version=$(sed -nE 's/^ARG CLUSTERIO_VERSION=([^[:space:]]+).*/\1/p' Dockerfile.host | head -1)" >> "$GITHUB_OUTPUT"

      - name: Assert README version references match Dockerfile
        run: |
          V="${{ steps.clusterio_version.outputs.version }}"
          grep -q "$V" README.md \
            || { echo "README is out of date: no reference to Clusterio $V (badge/tag examples). Update README.md alongside the CLUSTERIO_VERSION bump."; exit 1; }

      - name: Extract metadata for Controller
        id: meta-controller
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.CONTROLLER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.clusterio_version.outputs.version }},enable={{is_default_branch}}
            type=raw,value=${{ github.ref_name }}-clusterio-${{ steps.clusterio_version.outputs.version }},enable=${{ github.event_name != 'pull_request' }}
          labels: |
            org.opencontainers.image.title=Clusterio Controller
            org.opencontainers.image.description=Clusterio cluster controller with web UI and API
            io.clusterio.version=${{ steps.clusterio_version.outputs.version }}

      - name: Extract metadata for Host
        id: meta-host
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.HOST_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.clusterio_version.outputs.version }},enable={{is_default_branch}}
            type=raw,value=${{ github.ref_name }}-clusterio-${{ steps.clusterio_version.outputs.version }},enable=${{ github.event_name != 'pull_request' }}
          labels: |
            org.opencontainers.image.title=Clusterio Host
            org.opencontainers.image.description=Clusterio host with Factorio headless server
            io.clusterio.version=${{ steps.clusterio_version.outputs.version }}

      - name: Build and push Controller image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.controller
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-controller.outputs.tags }}
          labels: ${{ steps.meta-controller.outputs.labels }}
          build-args: |
            CLUSTERIO_TARGET=${{ env.CLUSTERIO_TARGET }}
            BUILD_REVISION=${{ github.sha }}
          # Distinct scopes: without them both images write the same cache
          # index and evict each other's layers on every run.
          cache-from: type=gha,scope=controller
          cache-to: type=gha,mode=max,scope=controller

      - name: Build and push Host image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.host
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-host.outputs.tags }}
          labels: ${{ steps.meta-host.outputs.labels }}
          build-args: |
            CLUSTERIO_TARGET=${{ env.CLUSTERIO_TARGET }}
            BUILD_REVISION=${{ github.sha }}
          cache-from: type=gha,scope=host
          cache-to: type=gha,mode=max,scope=host

      - name: Publish change notice to run summary
        if: github.event_name == 'push'
        run: |
          {
            echo "## Change notice (CHANGELOG.md, top entry)"
            echo
            awk '/^## /{n++} n==1' CHANGELOG.md
          } >> "$GITHUB_STEP_SUMMARY"

  # Test the built images
  test:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up test environment
        id: setup
        run: |
          cp .env.example .env
          echo "INIT_CLUSTERIO_ADMIN=testadmin" >> .env

          # Add Factorio credentials if available (enables runtime game client download on host-1)
          if [ -n "$FACTORIO_USERNAME" ] && [ -n "$FACTORIO_TOKEN" ]; then
            echo "FACTORIO_USERNAME=$FACTORIO_USERNAME" >> .env
            echo "FACTORIO_TOKEN=$FACTORIO_TOKEN" >> .env
            echo "has_client=true" >> "$GITHUB_OUTPUT"
            echo "Factorio credentials available — game client will be downloaded at runtime"
          else
            echo "has_client=false" >> "$GITHUB_OUTPUT"
            echo "No Factorio credentials — skipping game client tests"
          fi

          # Create database seed from examples
          cp seed-data/controller/database/users.example.json seed-data/controller/database/users.json
          cp seed-data/controller/database/roles.example.json seed-data/controller/database/roles.json
          sed -i 's/your_admin_username/testadmin/' seed-data/controller/database/users.json

          # Test fixtures are committed to the repo:
          #   seed-data/hosts/clusterio-host-1/TestInstance/dummy.zip  (test save)
          #   seed-data/mods/squeak-through-2_0.2.0.zip               (test mod)

          # Add a second instance on host-2 with auto_start disabled
          mkdir -p seed-data/hosts/clusterio-host-2/StoppedInstance
          echo '{"instance.auto_start": false}' > seed-data/hosts/clusterio-host-2/StoppedInstance/instance.json

          # External-plugin CI mount: the base compose ships this mount commented
          # out. Must be writable — install-plugins.sh npm-installs inside it.
          cat > docker-compose.plugin-ci.yml <<'YAML'
          services:
            clusterio-controller:
              volumes:
                - ./seed-data/external_plugins:/clusterio/external_plugins
          YAML
        env:
          FACTORIO_USERNAME: ${{ secrets.FACTORIO_USERNAME }}
          FACTORIO_TOKEN: ${{ secrets.FACTORIO_TOKEN }}

      # Same custom-target rule as the build job: factorio-* PR tests must run
      # the fork core the merge will publish (npm alpha.26 fails 2.1 mod parsing).
      - name: Clone Clusterio fork (non-main branch pushes + factorio-* PRs)
        if: >-
          (github.event_name == 'push' && github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')) ||
          (github.event_name == 'pull_request' && startsWith(github.base_ref, 'factorio-'))
        env:
          REF_NAME: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}
        run: |
          git clone --depth 1 -b "$REF_NAME" \
            https://github.com/solarcloud7/clusterio clusterio/ 2>/dev/null \
          || git clone --depth 1 \
            https://github.com/solarcloud7/clusterio clusterio/

      - name: Build images
        run: |
          # Skip game client at build time. If Factorio credentials are available
          # as repository secrets, host-1 will download the client at runtime instead.
          echo 'INSTALL_FACTORIO_CLIENT=false' >> .env
          # Use custom target when clusterio/ source is present (non-main branches)
          if [ -d "clusterio" ]; then
            echo 'CLUSTERIO_TARGET=custom' >> .env
          else
            echo 'CLUSTERIO_TARGET=release' >> .env
          fi
          # The base compose is consumer-first (image: only); builds live in the dev overlay.
          docker compose -f docker-compose.yml -f docker-compose.dev.yml build

      - name: Create external volumes
        run: docker volume create factorio-client

      - name: Start services
        # Dev overlay included so `up` uses the locally-built images, never pulls.
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.plugin-ci.yml up -d

      - name: Wait for controller health
        run: |
          # Healthy now means seeding-complete too (#20) — allow the full first-run window
          timeout 240 bash -c 'until docker inspect --format="{{.State.Health.Status}}" clusterio-controller | grep -q healthy; do sleep 5; done'

      - name: Wait for hosts to be running
        run: |
          # Healthy now means CONNECTED to the controller (#20); window covers an
          # optional runtime game client download (~450 MB) + the guard's connect wait
          timeout 360 bash -c 'until docker inspect --format="{{.State.Health.Status}}" clusterio-host-1 | grep -q healthy; do sleep 5; done'
          timeout 360 bash -c 'until docker inspect --format="{{.State.Health.Status}}" clusterio-host-2 | grep -q healthy; do sleep 5; done'

      - name: Wait for seed completion
        run: |
          echo "Waiting for instance seeding to complete..."
          timeout 120 bash -c 'until docker logs clusterio-controller 2>&1 | grep -q "Instance seeding complete"; do sleep 5; done'

      - name: Verify database seeding
        run: |
          echo "=== Verify admin user was seeded ==="
          docker exec clusterio-controller npx clusterioctl \
            --config /clusterio/tokens/config-control.json \
            user list 2>/dev/null | grep -q "testadmin" \
            && echo "PASS: Admin user 'testadmin' exists" \
            || { echo "FAIL: Admin user not found"; exit 1; }

      - name: Verify mod seeding
        run: |
          echo "=== Verify mod uploaded to controller ==="
          docker exec clusterio-controller npx clusterioctl \
            --config /clusterio/tokens/config-control.json \
            mod list 2>/dev/null | grep -q "squeak-through" \
            && echo "PASS: Mod 'squeak-through' uploaded" \
            || { echo "FAIL: Mod not found on controller"; exit 1; }

          echo "=== Verify mod pre-cached on host ==="
          docker exec clusterio-host-1 ls /clusterio/mods/ | grep -q "squeak-through" \
            && echo "PASS: Mod pre-cached on host-1" \
            || { echo "FAIL: Mod not pre-cached on host-1"; exit 1; }

          echo "=== Verify mod added to default mod pack ==="
          docker exec clusterio-controller npx clusterioctl \
            --config /clusterio/tokens/config-control.json \
            mod-pack show "Space Age 2.1" 2>/dev/null | grep -q "squeak-through-2" \
            && echo "PASS: Mod 'squeak-through-2' in default mod pack" \
            || { echo "FAIL: Mod not found in default mod pack"; exit 1; }

      - name: Verify instance seeding
        run: |
          INSTANCE_LIST=$(docker exec clusterio-controller npx clusterioctl \
            --config /clusterio/tokens/config-control.json \
            instance list 2>/dev/null)
          echo "$INSTANCE_LIST"

          echo "=== Verify TestInstance created and running ==="
          echo "$INSTANCE_LIST" | grep -q "TestInstance" \
            && echo "PASS: TestInstance exists" \
            || { echo "FAIL: TestInstance not found"; exit 1; }

          echo "=== Verify save uploaded ==="
          docker exec clusterio-controller npx clusterioctl \
            --config /clusterio/tokens/config-control.json \
            instance save list TestInstance 2>/dev/null | grep -q "dummy" \
            && echo "PASS: Save 'dummy.zip' uploaded" \
            || { echo "FAIL: Save not found on TestInstance"; exit 1; }

          echo "=== Verify StoppedInstance created but not running ==="
          echo "$INSTANCE_LIST" | grep "StoppedInstance" | grep -qi "stopped\|unassigned" \
            && echo "PASS: StoppedInstance is not running (auto_start=false)" \
            || { echo "FAIL: StoppedInstance should not be running"; exit 1; }

      - name: Verify export-data
        if: steps.setup.outputs.has_client == 'true'
        run: |
          echo "=== Stopping TestInstance for export-data ==="
          docker exec clusterio-controller npx clusterioctl \
            --config /clusterio/tokens/config-control.json \
            instance stop TestInstance 2>/dev/null || true
          sleep 5

          echo "=== Running export-data on TestInstance (host-1 game client) ==="
          timeout 120 docker exec clusterio-controller npx clusterioctl \
            --config /clusterio/tokens/config-control.json \
            instance export-data TestInstance \
            && echo "PASS: export-data completed successfully" \
            || { echo "FAIL: export-data failed"; exit 1; }

      - name: Verify plugin logs stream to stdout
        run: |
          echo "=== docker logs must contain [cluster-log] lines (#19 payoff) ==="
          for c in clusterio-controller clusterio-host-1; do
            timeout 60 bash -c "until docker logs $c 2>&1 | grep -q '\[cluster-log\]'; do sleep 5; done" \
              && echo "PASS: $c streams cluster logs to stdout" \
              || { echo "FAIL: no [cluster-log] lines in $c"; docker logs "$c" 2>&1 | tail -20; exit 1; }
          done

      # ---- Silent-degradation tripwires ----
      # Each of these protections can vanish with no error anywhere when a
      # Clusterio version bump changes internals. The tests exist to turn
      # "protection silently gone" into a red build.

      - name: Verify static-cache patch attached (engineering notes 6)
        run: |
          echo "=== Patch reports it found and flipped the upstream pattern ==="
          docker logs clusterio-controller 2>&1 | grep -qE "\[static-cache-patch\] (applied|already applied)" \
            && echo "PASS: static-cache patch attached" \
            || { echo "FAIL: patch did not attach — core layout changed, protection silently gone"
                 docker logs clusterio-controller 2>&1 | grep static-cache-patch || echo "(no patch log lines at all)"
                 exit 1; }

          echo "=== /static actually serves with revalidation, not immutable ==="
          ASSET=$(docker exec clusterio-controller sh -c "curl -fsS http://localhost:8080/" | grep -oE '/static/[^"]+\.js' | head -1)
          [ -n "$ASSET" ] || { echo "FAIL: app shell references no /static asset"; exit 1; }
          HEADER=$(docker exec clusterio-controller sh -c "curl -fsSI http://localhost:8080$ASSET" | tr -d '\r' | grep -i '^cache-control:')
          echo "asset=$ASSET  $HEADER"
          case "$HEADER" in
            *immutable*) echo "FAIL: /static still immutable — returning browsers pin stale web UI for a year"; exit 1;;
            *) echo "PASS: /static revalidates";;
          esac

      - name: Verify BUILD_INFO provenance
        run: |
          # Same condition the build step used to pick the target
          if [ -d "clusterio" ]; then EXPECTED=custom; else EXPECTED=release; fi
          for c in clusterio-controller clusterio-host-1; do
            INFO=$(docker exec "$c" cat /clusterio/BUILD_INFO)
            echo "--- $c ---"; echo "$INFO"
            echo "$INFO" | grep -q "\"clusterioTarget\": \"$EXPECTED\"" \
              && echo "PASS: $c built from expected target ($EXPECTED)" \
              || { echo "FAIL: $c clusterioTarget is not $EXPECTED"; exit 1; }
            echo "$INFO" | grep -q '"clusterioVersion":' \
              || { echo "FAIL: $c BUILD_INFO missing clusterioVersion"; exit 1; }
          done

      - name: Verify per-host game-port ranges (pitfall 6)
        run: |
          for n in 1 2; do
            RANGE="34${n}00-34${n}99"
            docker exec "clusterio-host-$n" cat /clusterio/data/config-host.json | grep -q "$RANGE" \
              && echo "PASS: host-$n derived port range $RANGE from HOST_ID" \
              || { echo "FAIL: host-$n config missing derived range $RANGE"
                   docker exec "clusterio-host-$n" cat /clusterio/data/config-host.json | grep -o 'factorio_port_range[^,}]*' || true
                   exit 1; }
          done

      # The full external-plugin lifecycle on a FRESH cluster: npm install,
      # the @clusterio dedup strip (pitfall 10), keyword-gated auto-discovery,
      # and the plugin's code actually loading. Every stage can fail silently.
      - name: Verify external plugin lifecycle (pitfall 10)
        run: |
          echo "=== install-plugins.sh installed the fixture ==="
          docker logs clusterio-controller 2>&1 | grep -q "Installing plugin: ci_fixture" \
            && echo "PASS: fixture install ran" \
            || { echo "FAIL: install-plugins.sh never processed ci_fixture"; exit 1; }

          echo "=== @clusterio dedup strip fired and no duplicates remain ==="
          docker logs clusterio-controller 2>&1 | grep -q "Removing local @clusterio packages" \
            && echo "PASS: strip fired (npm planted peer deps as expected)" \
            || { echo "FAIL: strip never fired — npm peer-dep behavior changed?"; exit 1; }
          docker exec clusterio-controller sh -c '[ ! -d /clusterio/external_plugins/ci_fixture/node_modules/@clusterio ]' \
            && echo "PASS: no local @clusterio duplicates remain" \
            || { echo "FAIL: local @clusterio duplicates survived the strip"; exit 1; }

          echo "=== keyword-gated auto-discovery registered it ==="
          docker exec clusterio-controller sh -c 'grep -q ci_fixture /clusterio/plugin-list.json' \
            && echo "PASS: ci_fixture in plugin-list.json" \
            || { echo "FAIL: not discovered — clusterio-plugin keyword contract broken?"
                 docker exec clusterio-controller cat /clusterio/plugin-list.json || true
                 exit 1; }

          echo "=== the plugin's controller code actually loaded ==="
          timeout 60 bash -c 'until docker logs clusterio-controller 2>&1 | grep -q "ci_fixture controller plugin loaded"; do sleep 5; done' \
            && echo "PASS: fixture controller entrypoint ran" \
            || { echo "FAIL: plugin registered but its code never loaded"
                 docker logs clusterio-controller 2>&1 | grep -i "ci_fixture\|plugin" | tail -20
                 exit 1; }

          echo "=== clusterioctl unharmed (no duplicate singleton) ==="
          timeout 30 docker exec clusterio-controller npx clusterioctl \
            --config /clusterio/tokens/config-control.json \
            user list >/dev/null 2>&1 \
            && echo "PASS: clusterioctl works with the external plugin installed" \
            || { echo "FAIL: clusterioctl broken after plugin install (duplicate @clusterio/lib?)"; exit 1; }

      - name: Verify idempotent restart + boot-race guard
        run: |
          echo "=== Restart and verify no duplicate seeding ==="
          docker compose restart
          sleep 30
          INSTANCE_COUNT=$(docker exec clusterio-controller npx clusterioctl \
            --config /clusterio/tokens/config-control.json \
            instance list 2>/dev/null | grep -cE "TestInstance|StoppedInstance" || true)
          echo "Instance count after restart: $INSTANCE_COUNT"
          [ "$INSTANCE_COUNT" -le 2 ] \
            && echo "PASS: No duplicate instances after restart" \
            || { echo "FAIL: Duplicate instances detected"; exit 1; }

          echo "=== Boot-race guard completed on both hosts (2nd run = post-restart) ==="
          for h in clusterio-host-1 clusterio-host-2; do
            timeout 330 bash -c "until [ \"\$(docker logs $h 2>&1 | grep -c 'boot-race guard: complete')\" -ge 2 ]; do sleep 5; done" \
              && echo "PASS: guard completed on $h after restart" \
              || { echo "FAIL: guard did not complete on $h after restart"
                   echo "--- stdout tail ---"; docker logs "$h" 2>&1 | tail -30
                   echo "--- guard file log (discriminator: absent = never launched; present = stdout lost) ---"
                   docker exec "$h" cat /clusterio/data/boot-race-guard.log 2>/dev/null || echo "(no guard log file)"
                   exit 1; }
            docker logs "$h" 2>&1 | grep "boot-race guard:" | tail -4
          done

          echo "=== TestInstance running after restart (guard bounces it if it raced) ==="
          timeout 180 bash -c 'until docker exec clusterio-controller npx clusterioctl \
            --config /clusterio/tokens/config-control.json \
            instance list 2>/dev/null | grep "TestInstance" | grep -q "running"; do sleep 5; done' \
            && echo "PASS: TestInstance running after restart" \
            || { echo "FAIL: TestInstance not running after restart"; exit 1; }

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v
